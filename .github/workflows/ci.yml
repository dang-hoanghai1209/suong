name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "backup/**"
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GEMINI_API_KEY: ""
  GEMINI_API_KEYS: ""
  GOOGLE_API_KEY: ""
  GOOGLE_TTS_API_KEY: ""
  GOOGLE_APPLICATION_CREDENTIALS: ""
  CF_ACCOUNT_ID: ""
  CF_ACCOUNTS: ""
  CF_AI_TOKEN: ""
  CLOUDFLARE_ACCOUNT_ID: ""
  CLOUDFLARE_API_TOKEN: ""
  XAI_API_KEY: ""
  PEXELS_API_KEY: ""
  PEXELS_API_KEYS: ""

jobs:
  windows-full:
    name: Windows full suite
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install FFmpeg
        shell: pwsh
        run: choco install ffmpeg --yes --no-progress
      - name: Install locked development dependencies
        run: uv sync --locked --extra dev
      - name: Print tool versions
        shell: pwsh
        run: |
          python --version
          uv --version
          ffmpeg -version | Select-Object -First 1
          ffprobe -version | Select-Object -First 1
      - name: Assert clean-checkout music safety
        shell: pwsh
        run: |
          if (Test-Path "music/tracks/practical_calm_01.mp3") { throw "Production MP3 must be absent in CI" }
          if (git ls-files -- "music/tracks/*.mp3") { throw "Production MP3 must not be tracked" }
      - name: Compile
        run: python -m compileall -q tella scripts
      - name: Run full test suite
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force out/ci | Out-Null
          uv run --extra dev python -m pytest -q --junitxml=out/ci/windows-pytest.xml
      - name: Validate CLI, recipes, and voice profiles
        shell: pwsh
        run: |
          uv run tella --help
          uv run tella --list-recipes | Select-String "practical_life_steps_callirrhoe_v1"
          uv run tella --validate-voice-profiles
          git diff --check
      - name: Upload test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-pytest
          path: out/ci/windows-pytest.xml
          if-no-files-found: ignore
          retention-days: 7

  linux-smoke:
    name: Linux cross-platform smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg
      - name: Install locked development dependencies
        run: uv sync --locked --extra dev
      - name: Assert clean-checkout music safety
        run: |
          test ! -e music/tracks/practical_calm_01.mp3
          test -z "$(git ls-files -- 'music/tracks/*.mp3')"
      - name: Compile
        run: python -m compileall -q tella scripts
      - name: Run cross-platform smoke tests
        run: >-
          uv run --extra dev python -m pytest -q
          tests/test_atomic_writes.py
          tests/test_production_lock.py
          tests/test_synthetic_music_fixture.py
          tests/test_production_resume.py
          tests/test_gemini_tts.py
          tests/test_sentence_alignment.py
          tests/test_practical_callirrhoe_recipe.py
          tests/test_scene_regeneration.py
          tests/test_visual_acceptance.py
      - name: Validate CLI and worktree
        run: |
          uv run tella --help
          uv run tella --validate-voice-profiles
          git diff --check
